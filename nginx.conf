# ─────────────────────────────────────────
# EBM Frontend · nginx (Cloud Run)
#
# 職責：
#   1. Serve Vue 3 SPA 靜態檔 + history fallback
#   2. 反向代理 /ECAPI/* 到後端（webris.ebmtech.com）
#   3. Gzip、快取、安全 header
# ─────────────────────────────────────────

# DNS resolver 給 proxy_pass 動態解析（Cloud Run 環境用 Google 公用 DNS）
resolver 8.8.8.8 8.8.4.4 valid=300s ipv6=off;
resolver_timeout 10s;

server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # ─── Gzip 壓縮 ───
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # ─── 基本安全 header ───
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ─── 健康檢查（Cloud Run 會自動呼叫） ───
  location = /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # ─── 靜態資源 · 強快取（1 年 immutable） ───
  # Vite build 會產 hash 檔名（如 index-a1b2c3.js），所以長期 cache 安全
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ─── API 反向代理 · 後端：webris.ebmtech.com/ECAPI ───
  # 若要切換後端位置，把下面的 proxy_pass 改成新的 host 即可。
  location /ECAPI/ {
    # 用變數寫 proxy_pass 讓 nginx 啟動時不要求 DNS resolve 成功
    set $ebm_backend "https://webris.ebmtech.com";
    proxy_pass $ebm_backend;

    proxy_set_header Host webris.ebmtech.com;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    proxy_ssl_protocols TLSv1.2 TLSv1.3;

    proxy_http_version 1.1;
    proxy_connect_timeout 10s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;

    # 不緩衝 response，讓長回應能即時傳回
    proxy_buffering off;
  }

  # ─── SPA history fallback ───
  # 路由 /app/*、/admin/* 等純前端路由都回傳 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── index.html 不快取（確保 deploy 後使用者立刻拿到新版） ───
  location = /index.html {
    expires 0;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }
}
