# ─────────────────────────────────────────
# EBM Frontend · nginx (Cloud Run)
#
# 職責：
#   1. Serve Vue 3 SPA 靜態檔 + history fallback
#   2. 反向代理 /ECAPI/* 到後端（後端上線前暫時回 503）
#   3. Gzip、快取、安全 header
# ─────────────────────────────────────────

server {
  listen 8080;
  server_name _;
  server_tokens off;

  root /usr/share/nginx/html;
  index index.html;

  # ─── Gzip 壓縮（Tailwind CSS / JS 壓縮率約 70%） ───
  gzip on;
  gzip_vary on;
  gzip_min_length 256;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # ─── 基本安全 header ───
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ─── 健康檢查（Cloud Run 會自動呼叫） ───
  location = /health {
    access_log off;
    return 200 'ok';
    add_header Content-Type text/plain;
  }

  # ─── 靜態資源 · 強快取（1 年 immutable） ───
  # Vite build 會產 hash 檔名（如 index-a1b2c3.js），所以長期 cache 安全
  location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # ─── API 反向代理（預留位置，後端上線後啟用） ───
  location /ECAPI/ {
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # TODO（後端部署完成後）：
    # 1. 取消下面 5 行 proxy_* 註解
    # 2. 把 <YOUR-BACKEND-CLOUD-RUN-URL> 替換成實際 URL
    # 3. 移除下面的 return 503 區塊
    # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
    # proxy_pass         https://<YOUR-BACKEND-CLOUD-RUN-URL>;
    # proxy_set_header   Host $proxy_host;
    # proxy_set_header   X-Real-IP $remote_addr;
    # proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    # proxy_set_header   X-Forwarded-Proto $scheme;

    # 暫時回 503 讓前端能看出「後端還沒上」
    default_type application/json;
    return 503 '{"error":"backend not deployed yet","hint":"請先部署 .NET 後端到 Cloud Run，再更新 frontend/nginx.conf 的 proxy_pass"}';
  }

  # ─── SPA history fallback ───
  # 路由 /styleguide、/login 等純前端路由都回傳 index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # ─── index.html 不快取（確保 deploy 後使用者立刻拿到新版） ───
  location = /index.html {
    expires 0;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
  }
}
