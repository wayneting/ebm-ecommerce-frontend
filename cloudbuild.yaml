# Cloud Build 設定 — 用於 GitHub 自動 trigger（如需設自動 CI/CD）
#
# 觸發器設定：
#   1. Cloud Console → Cloud Build → Triggers → Create Trigger
#   2. Source: 選你的 GitHub repo
#   3. Event: Push to branch
#   4. Branch: ^main$
#   5. Configuration: Cloud Build configuration file
#   6. Location: /frontend/cloudbuild.yaml
#
# 手動觸發（不設 trigger 時用 deploy.sh 即可）：
#   gcloud builds submit --config cloudbuild.yaml --substitutions _REGION=asia-east1

substitutions:
  _REGION: asia-east1
  _SERVICE: ebm-frontend
  _REPO: ebm-ecommerce
  _MEMORY: 256Mi
  _CPU: "1"
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "3"

steps:
  # Step 1: Docker build
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest
      - .

  # Step 2: Push to Artifact Registry
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}

  # Step 3: Deploy to Cloud Run
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=${_MEMORY}
      - --cpu=${_CPU}
      - --min-instances=${_MIN_INSTANCES}
      - --max-instances=${_MAX_INSTANCES}
      - --port=8080

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8  # 加速 npm ci + vite build

timeout: 900s  # 15 分鐘
